<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="app-version" content="__APP_VERSION__">
  <meta name="theme-color" content="#1E1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Maze Party</title>
  <meta name="description" content="Multiplayer maze — phones become controllers, a shared screen shows the action.">
  <meta property="og:title" content="Maze Party">
  <meta property="og:description" content="Multiplayer maze — phones become controllers, a shared screen shows the action.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Maze Party">
  <meta name="twitter:description" content="Multiplayer maze — phones become controllers, a shared screen shows the action.">
  <link rel="stylesheet" href="/shared/fonts/orbitron.css?v=__APP_V__">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="stylesheet" href="/shared/theme.css?v=__APP_V__">
  <link rel="stylesheet" href="/shared/results.css?v=__APP_V__">
  <link rel="stylesheet" href="/display/display.css?v=__APP_V__">
</head>
<body>
  <!-- Welcome screen -->
  <div id="welcome-screen" class="screen">
    <span id="welcome-version-label"></span>
    <h1 class="gradient-title">MAZE<span class="gradient-title__sub">party</span></h1>
    <div id="welcome-actions">
      <button id="new-game-btn" class="btn btn-primary" data-i18n="start_new_game">START NEW GAME</button>
    </div>
    <div id="welcome-footer">
      <div class="footer-row">
        <span class="footer-group">
          <a id="github-link" href="https://github.com/tim4724/Maze-Party" target="_blank" rel="noopener" data-i18n="stacked_by">Built by Tim</a>
        </span>
      </div>
    </div>
  </div>

  <!-- Lobby screen: QR code + player list + start button -->
  <div id="lobby-screen" class="screen hidden">
    <span id="lobby-version-label"></span>
    <h1 class="gradient-title">MAZE<span class="gradient-title__sub">party</span></h1>
    <div id="lobby-body">
      <div id="qr-container">
        <canvas id="qr-code"></canvas>
        <div id="qr-info">
          <span id="qr-label" data-i18n="scan_to_join">Scan or visit</span>
          <p id="join-url">
            <span class="join-url__host"></span><span class="join-url__code"></span>
          </p>
        </div>
      </div>
      <div id="player-list"></div>
    </div>
    <button id="start-btn" class="btn btn-primary" disabled data-i18n="waiting_for_players">Waiting for players...</button>
    <div id="lobby-footer">
      <div class="footer-row">
        <a href="https://github.com/tim4724/Maze-Party" target="_blank" rel="noopener" data-i18n="stacked_by">Built by Tim</a>
      </div>
    </div>
  </div>

  <!-- Relay status bar — sibling of all screens (lobby, game, results) so
       it persists across gameplay. Hidden on welcome via `html:not(.in-session)`. -->
  <div id="relay-status-bar">
    <span id="relay-chip" class="relay-chip hidden" role="status" data-i18n-aria-label="relay_server_status_label" aria-label="Relay server status" aria-live="polite">
      <span id="relay-chip-dot" class="relay-chip__dot" aria-hidden="true"></span>
      <span id="relay-chip-region" class="relay-chip__region"></span>
    </span>
    <button id="relay-report-btn" class="relay-report-btn hidden" type="button" data-i18n="report_bad_latency">Report bad latency</button>
  </div>

  <div id="game-toolbar" class="hidden">
    <button id="fullscreen-btn" class="icon-btn" role="switch" aria-checked="false" data-i18n-title="fullscreen" title="Fullscreen" data-i18n-aria-label="fullscreen" aria-label="Fullscreen"><svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M3 3h4V1H1v6h2V3zM11 1v2h4v4h2V1h-6zM15 15h-4v2h6v-6h-2v4zM3 11H1v6h6v-2H3v-4z"/></svg></button>
    <button id="pause-btn" class="icon-btn" data-i18n-aria-label="pause" aria-label="Pause"><span class="pause-icon"></span></button>
  </div>

  <!-- Game screen: canvas boards -->
  <div id="game-screen" class="screen hidden">
    <canvas id="game-canvas"></canvas>
    <div id="countdown-overlay" class="hidden"><span id="countdown-number"></span></div>
  </div>

  <!-- Pause overlay -->
  <div id="pause-overlay" class="game-overlay hidden">
    <h1 data-i18n="paused">PAUSED</h1>
    <div id="pause-buttons">
      <button id="pause-continue-btn" class="btn btn-primary" data-i18n="continue_btn">Continue</button>
      <button id="pause-newgame-btn" class="btn btn-secondary" data-i18n="new_game">New Game</button>
    </div>
  </div>

  <!-- Reconnect overlay -->
  <div id="reconnect-overlay" class="game-overlay hidden">
    <h1 id="reconnect-heading" data-i18n="reconnecting">RECONNECTING</h1>
    <p id="reconnect-status" class="game-overlay__status" data-i18n="connection_lost">Connection lost...</p>
    <button id="reconnect-btn" class="btn btn-primary hidden" data-i18n="reconnect">RECONNECT</button>
  </div>

  <!-- Results overlay (shown on top of game screen) -->
  <div id="results-screen" class="screen hidden">
    <div id="results-list"></div>
    <div id="results-buttons">
      <button id="play-again-btn" class="btn btn-primary" data-i18n="play_again">Play Again</button>
      <button id="new-game-results-btn" class="btn btn-secondary" data-i18n="new_game">New Game</button>
    </div>
  </div>

  <script src="/engine/constants.js"></script>
  <script src="/engine/maze-gen.js"></script>
  <script src="/engine/maze-engine.js"></script>
  <script src="/partyplug/PartyConnection.js"></script>
  <script src="/partyplug/PartyFastlane.js"></script>
  <script src="/partyplug/RoomFlow.js"></script>
  <script src="/shared/protocol.js"></script>
  <script src="/shared/i18n.js"></script>
  <script src="/shared/i18n-fallback.js"></script>
  <script src="/shared/CanvasUtils.js"></script>
  <script src="/shared/theme.js"></script>
  <script src="/display/MazeRenderer.js"></script>
  <script src="/display/DisplayState.js"></script>
  <script src="/display/DisplayUI.js"></script>
  <script src="/display/DisplayConnection.js"></script>
  <script src="/display/DisplayAudio.js"></script>
  <script src="/display/DisplayGame.js"></script>
  <script src="/display/DisplayLiveness.js"></script>
  <script src="/display/DisplayInput.js"></script>
  <script src="/display/DisplayRender.js"></script>
  <script src="/display/display.js"></script>
</body>
</html>
